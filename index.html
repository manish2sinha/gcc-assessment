<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC Readiness Assessment — Manish Sinha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3ef; --bg2: #ffffff; --bg3: rgba(0,0,0,0.03);
  --t1: #1a1a18; --t2: #555550; --t3: #999990; --t4: #bbb;
  --b1: rgba(0,0,0,0.07); --b2: rgba(0,0,0,0.12);
  --r: 8px; --rl: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --bg2: #1e1e1c; --bg3: rgba(255,255,255,0.03);
    --t1: #f0ede8; --t2: #c0bcb6; --t3: #888882; --t4: #aaa;
    --b1: rgba(255,255,255,0.08); --b2: rgba(255,255,255,0.14);
  }
}
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg); color: var(--t1);
  line-height: 1.6; min-height: 100vh;
}
.page { max-width: 580px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
.screen { animation: fu 0.35s ease both; }
@keyframes fu { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* Shared */
.ey { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t4); margin-bottom: 1.25rem; }
.sl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--t4); margin-bottom: 0.9rem; }
.dv { border: none; border-top: 0.5px solid var(--b1); margin: 2rem 0; }

/* Buttons */
.bp { display:inline-block; margin-top:2rem; background:var(--t1); color:var(--bg); border:none; border-radius:var(--r); padding:13px 30px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity .15s; text-decoration:none; }
.bp:hover { opacity:.8; }
.bc { display:inline-block; background:var(--t1); color:var(--bg); border:none; border-radius:var(--r); padding:12px 26px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity .15s; text-decoration:none; }
.bc:hover { opacity:.8; }
.bs { display:inline-block; background:transparent; color:var(--t2); border:0.5px solid var(--b2); border-radius:var(--r); padding:10px 22px; font-size:13px; cursor:pointer; font-family:inherit; transition:all .15s; text-decoration:none; }
.bs:hover { color:var(--t1); border-color:var(--t3); }
.bk { background:none; border:none; color:var(--t3); font-size:13px; cursor:pointer; font-family:inherit; padding:0; transition:color .15s; }
.bk:hover { color:var(--t2); }
.rl { font-size:13px; color:var(--t3); background:none; border:none; cursor:pointer; font-family:inherit; padding:0; text-decoration:underline; text-underline-offset:3px; }

/* Intro */
.ti { font-family:'DM Serif Display',serif; font-size:clamp(24px,4vw,30px); font-weight:400; line-height:1.3; margin-bottom:1rem; }
.su { font-size:15px; color:var(--t2); line-height:1.75; margin-bottom:.75rem; }
.no { font-size:13px; color:var(--t3); line-height:1.65; margin-top:1.75rem; padding-top:1.75rem; border-top:0.5px solid var(--b1); }

/* Progress */
.pw { margin-bottom:3rem; }
.pt { display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem; }
.pl { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); }
.pc { font-size:12px; color:var(--t3); }
.pk { height:2px; background:var(--b1); border-radius:2px; overflow:hidden; }
.pf { height:100%; background:var(--t1); border-radius:2px; transition:width .4s ease; }

/* Question */
.qd { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:.75rem; }
.qt { font-family:'DM Serif Display',serif; font-size:clamp(19px,3vw,23px); font-weight:400; color:var(--t1); line-height:1.5; margin-bottom:2.5rem; }
.qo { display:flex; flex-direction:column; gap:10px; }
.qb { width:100%; padding:14px 18px; border:0.5px solid var(--b1); border-radius:var(--rl); background:var(--bg2); color:var(--t2); font-size:14px; text-align:left; cursor:pointer; transition:all .15s; font-family:inherit; display:flex; align-items:center; gap:12px; }
.qb:hover { border-color:var(--b2); color:var(--t1); }
.qb.sel { background:var(--t1); color:var(--bg); border-color:var(--t1); }
.od { width:8px; height:8px; border-radius:50%; border:1px solid currentColor; flex-shrink:0; opacity:.4; }
.qb.sel .od { background:var(--bg); opacity:1; }
.nr { display:flex; align-items:center; justify-content:space-between; margin-top:2rem; }

/* Qualitative */
.qln { font-family:'DM Serif Display',serif; font-size:clamp(19px,3vw,23px); font-weight:400; color:var(--t1); line-height:1.5; margin-bottom:.5rem; }
.qs { font-size:13px; color:var(--t3); margin-bottom:1.75rem; }
.ta { width:100%; border:0.5px solid var(--b2); border-radius:var(--rl); padding:14px 16px; font-size:15px; font-family:inherit; color:var(--t1); background:var(--bg2); resize:none; line-height:1.65; transition:border-color .15s; }
.ta:focus { outline:none; border-color:var(--t3); }
.ta::placeholder { color:var(--t3); }
.qn { display:flex; align-items:center; justify-content:space-between; margin-top:1.5rem; }

/* Generating */
.gw { padding:5rem 0; text-align:center; }
.gl { font-size:15px; color:var(--t2); margin-bottom:1.5rem; }
.gd { display:flex; gap:7px; justify-content:center; }
.gdt { width:6px; height:6px; border-radius:50%; background:var(--t3); animation:pu 1.2s ease-in-out infinite; }
.gdt:nth-child(2) { animation-delay:.2s; }
.gdt:nth-child(3) { animation-delay:.4s; }
@keyframes pu { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* Results */
.po { font-family:'DM Serif Display',serif; font-size:clamp(22px,4vw,28px); font-weight:400; line-height:1.35; margin-bottom:0; }
.holding-items, .gap-items { display:flex; flex-direction:column; gap:8px; }
.holding-item { padding:14px 18px; background:var(--bg2); border-radius:var(--rl); border:0.5px solid var(--b1); }
.gap-item { padding:16px 18px; background:var(--bg2); border-radius:var(--rl); border:0.5px solid var(--b1); border-left:2.5px solid var(--t1); }
.idim { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; }
.itxt { font-size:14px; color:var(--t1); line-height:1.7; }
.tension-box { padding:16px 20px; background:var(--bg2); border-radius:var(--rl); border:0.5px solid var(--b1); }
.tension-text { font-size:14px; color:var(--t1); line-height:1.75; font-style:italic; }
.ref-quote { font-family:'DM Serif Display',serif; font-style:italic; font-size:17px; color:var(--t3); line-height:1.65; padding-left:16px; border-left:2px solid var(--b2); margin-bottom:1rem; }
.ref-connect { font-size:14px; color:var(--t2); line-height:1.7; }
.traj-box { padding:14px 18px; background:var(--bg3); border-radius:var(--rl); border:0.5px solid var(--b1); }
.traj-text { font-size:13px; color:var(--t3); line-height:1.75; }

/* Email block */
.eb { padding:1.75rem; border:0.5px solid var(--b1); border-radius:var(--rl); background:var(--bg2); }
.et { font-size:13px; font-weight:500; color:var(--t1); margin-bottom:.3rem; }
.es { font-size:13px; color:var(--t3); margin-bottom:1.25rem; line-height:1.6; }
.ef { display:flex; flex-direction:column; gap:10px; margin-bottom:1rem; }
.ei { width:100%; border:0.5px solid var(--b2); border-radius:var(--r); padding:11px 14px; font-size:14px; font-family:inherit; color:var(--t1); background:var(--bg); transition:border-color .15s; }
.ei:focus { outline:none; border-color:var(--t3); }
.ei::placeholder { color:var(--t3); }
.em { font-size:13px; margin-top:.75rem; line-height:1.5; }
.em.ok { color:#3B6D11; }
.em.err { color:#A32D2D; }

/* CTA block */
.cta { padding:2rem; background:#1a1a18; border-radius:14px; color:#f0ede8; }
.cta-personal { font-size:14px; color:rgba(255,255,255,.7); line-height:1.75; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:0.5px solid rgba(255,255,255,.1); font-style:italic; }
.cta-name { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:3px; color:#f0ede8; }
.cta-role { font-size:12px; color:rgba(255,255,255,.45); margin-bottom:1rem; }
.cta-body { font-size:14px; color:rgba(255,255,255,.65); line-height:1.7; margin-bottom:1rem; }
.cta-sizing { font-size:12px; color:rgba(255,255,255,.3); line-height:1.65; margin-bottom:1.5rem; }
.cta-btns { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.cta-btn { display:inline-block; background:#f0ede8; color:#1a1a18; text-decoration:none; padding:12px 24px; border-radius:8px; font-size:13px; font-weight:500; font-family:inherit; transition:opacity .15s; }
.cta-btn:hover { opacity:.85; }

@media(max-width:480px){.page{padding:2rem 1rem 4rem;}.qb{padding:12px 14px;}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script>
// ── Replace these four values before uploading ──────────────────────────────
const ANTHROPIC_API_KEY   = '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';
// ───────────────────────────────────────────────────────────────────────────

const Qs = [
  { id:1, d:'Structural Fit for Mandate',      t:'The way my GCC is structured matches what it is being asked to deliver.' },
  { id:2, d:'People Manager Stretch',          t:'My people managers are not stretched beyond what the structure was designed for.' },
  { id:3, d:'Role & Accountability Clarity',   t:'People in my GCC know what they own. When something goes wrong, it is clear who is responsible.' },
  { id:4, d:'Decision Velocity',               t:'Decisions that should be made here are made here. They do not escalate unnecessarily.' },
  { id:5, d:'Attrition as a Signal',           t:'When strong people leave my GCC, structural frustration is not the reason.' },
  { id:6, d:'Delivery as a Structural Outcome',t:'When delivery slips, I look at how we are organised. Not just at who is responsible.' },
  { id:7, d:'Leadership Bench',                t:'I have the right leaders in place for where the GCC is going, not just where it has been.' },
  { id:8, d:'Local HR Fit for Scale',          t:'The HR support available to my GCC is built for the organisational questions I am now dealing with. Not just day to day operations.' },
  { id:9, d:'Governance & Autonomy',           t:'My GCC has enough autonomy to make structural and people decisions without waiting on the global organisation.' }
];

const SC = ['Strongly disagree','Disagree','Agree','Strongly agree'];
let S = { screen:'intro', cur:0, ans:{}, qual:'', result:null };

function R() {
  const m = { intro:rI, question:rQ, qual:rQl, generating:rG, results:rRes };
  document.getElementById('app').innerHTML = (m[S.screen]||rI)();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function rI() {
  return `<div class="screen">
    <p class="ey">Manish Sinha · GCC Organization Design</p>
    <h1 class="ti">Is your GCC structurally ready for the next phase?</h1> where the structure built for one phase of growth is being asked to perform in the next. This assessment helps you see clearly where you are.</p>
    <p class="su">Nine statements. A direct, personalized read on what is holding structurally, where the gaps are, and what is worth addressing first.</p>
    <p class="no">Takes about 4 minutes. Best completed by the GCC leader or a senior member of the leadership team.</p>
    <button class="bp" onclick="go()">Let's start</button>
  </div>`;
}

function rQ() {
  const q=Qs[S.cur], p=(S.cur/Qs.length)*100, sel=S.ans[q.id];
  return `<div class="screen">
    <div class="pw">
      <div class="pt"><span class="pl">Manish Sinha · GCC Organization Design</span><span class="pc">${S.cur+1} of ${Qs.length}</span></div>
      <div class="pk"><div class="pf" style="width:${p}%"></div></div>
    </div>
    <p class="qd">${q.d}</p>
    <p class="qt">${q.t}</p>
    <div class="qo">
      ${SC.map(s=>`<button class="qb${sel===s?' sel':''}" onclick="pick(${q.id},'${s}')"><span class="od"></span>${s}</button>`).join('')}
    </div>
    <div class="nr">
      <button class="bk" onclick="back()">${S.cur===0?'Back to start':'Previous'}</button>
      ${sel
        ? `<button class="bp" style="margin-top:0" onclick="nxt()">Next</button>`
        : `<span style="font-size:13px;color:var(--t3)">Select an option to continue</span>`}
    </div>
  </div>`;
}

function rQl() {
  return `<div class="screen">
    <div class="pw">
      <div class="pt"><span class="pl">Manish Sinha · GCC Organization Design</span><span class="pc">Final question</span></div>
      <div class="pk"><div class="pf" style="width:100%"></div></div>
    </div>
    <p class="qd">One last question</p>
    <p class="qln">What is the one structural problem in your GCC that you have not been able to solve from within?</p>
    <p class="qs">Optional. Your answer shapes the final reflection in your assessment.</p>
    <textarea class="ta" rows="4" placeholder="Write freely..." id="qi" oninput="S.qual=this.value">${S.qual}</textarea>
    <div class="qn">
      <button class="bk" onclick="back()">Previous</button>
      <button class="bp" style="margin-top:0" onclick="submit()">See my results</button>
    </div>
  </div>`;
}

function rG() {
  return `<div class="screen gw">
    <p class="gl">Reading your responses</p>
    <div class="gd"><div class="gdt"></div><div class="gdt"></div><div class="gdt"></div></div>
  </div>`;
}

function rRes() {
  if (!S.result) return `<div class="screen" style="padding:3rem 0;text-align:center;color:var(--t2)">Something went wrong. Please try again.</div>`;
  const r = S.result;
  let h = `<div class="screen">
    <p class="po">${r.posture}</p>`;

  if (r.holding && r.holding.length) {
    h += `<hr class="dv"><p class="sl">What is holding</p><div class="holding-items">`;
    r.holding.forEach(g => { h += `<div class="holding-item"><p class="idim">${g.dimension}</p><p class="itxt">${g.insight}</p></div>`; });
    h += `</div>`;
  }

  if (r.gaps && r.gaps.length) {
    h += `<hr class="dv"><p class="sl">Where attention is needed</p><div class="gap-items">`;
    r.gaps.forEach(g => { h += `<div class="gap-item"><p class="idim">${g.dimension}</p><p class="itxt">${g.insight}</p></div>`; });
    h += `</div>`;
  }

  if (r.tension) h += `<hr class="dv"><p class="sl">One observation</p><div class="tension-box"><p class="tension-text">${r.tension}</p></div>`;

  if (r.reflection && S.qual && S.qual.trim().length > 20) {
    h += `<hr class="dv"><p class="sl">On what you said</p><p class="ref-quote">"${S.qual.trim()}"</p><p class="ref-connect">${r.reflection}</p>`;
  }

  if (r.trajectory) h += `<hr class="dv"><p class="sl">If left unaddressed</p><div class="traj-box"><p class="traj-text">${r.trajectory}</p></div>`;

  h += `<hr class="dv">
    <div class="eb">
      <p class="et">Email this assessment</p>
      <p class="es">Enter your details and we will send this to your inbox. Manish will receive a copy.</p>
      <div class="ef">
        <input class="ei" type="text"  id="cn" placeholder="Your name" />
        <input class="ei" type="email" id="ce" placeholder="Your email address" />
      </div>
      <button class="bc" onclick="sendMail(this)">Send assessment</button>
      <p class="em" id="es2"></p>
    </div>

    <hr class="dv">
    <div class="cta">
      <p class="cta-personal">"I have seen this pattern in many GCCs at this stage. The good news is that it has a structural answer — and it is usually clearer than it feels from the inside. I would welcome a conversation to understand whether that is the case here."</p>
      <p class="cta-name">Manish Sinha</p>
      <p class="cta-role">GCC Organization Design Partner · Bangalore</p>
      <p class="cta-body">Most engagements begin with a 60 to 90 minute discovery conversation — no commitment, no agenda other than understanding whether there is a fit.</p>
      <p class="cta-sizing">Most relevant for GCCs in a scaling phase, typically between 200 and 500 people, where structural questions are building but dedicated senior design support is not yet in place.</p>
      <div class="cta-btns">
        <a class="cta-btn" href="mailto:manish@manishsinha.com?subject=GCC Assessment — Discovery Conversation">Schedule a conversation</a>
        <a class="bs" style="color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.2)" href="https://linkedin.com/in/ManishSinhaHR" target="_blank">View profile</a>
      </div>
    </div>

    <div style="margin-top:2rem"><button class="rl" onclick="retry()">Retake assessment</button></div>
  </div>`;
  return h;
}

function go()   { S.screen='question'; S.cur=0; R(); }
function back() {
  if (S.screen==='qual') { S.screen='question'; S.cur=Qs.length-1; }
  else if (S.cur>0) { S.cur--; }
  else { S.screen='intro'; }
  R();
}
function nxt() {
  if (S.cur < Qs.length-1) { S.cur++; }
  else { S.screen='qual'; }
  R();
}
function pick(id,v) { S.ans[id]=v; R(); }

async function submit() {
  const qi = document.getElementById('qi');
  if (qi) S.qual = qi.value;
  S.screen='generating'; R();

  const sum = Qs.map(q=>`${q.d}: "${q.t}" → ${S.ans[q.id]}`).join('\n');

  const prompt = `You are Manish Sinha, a GCC Organization Design Partner based in Bangalore. You have spent years diagnosing structural problems in GCCs — spans of control, layer design, role clarity, people manager stretch, leadership bench gaps, decision velocity. You are direct, professional, and deeply experienced. You do not flatter. You do not hedge. You name what you see clearly and respectfully.

A GCC leader has completed your structural readiness assessment. Here are their responses:

${sum}

Their open-ended response to "What is the one structural problem in your GCC that you have not been able to solve from within?":
"${S.qual||'Not provided'}"

Write a personalized structural assessment. Be direct and honest. Sound like an experienced advisor who has seen this before, not a tool generating output.

Respond ONLY with valid JSON, no markdown, no backticks, no preamble:
{
  "posture": "One sentence under 14 words. A mirror that names their structural position clearly. Should make them feel understood, not judged. Avoid generic labels.",
  "holding": [
    { "dimension": "dimension name", "insight": "1-2 sentences on what is genuinely structurally strong. Be specific. Not encouragement — observation." }
  ],
  "gaps": [
    { "dimension": "dimension name", "insight": "1-2 sentences on what this gap means structurally right now. Name the consequence. Be direct but respectful." }
  ],
  "tension": "2 sentences naming a structural contradiction if one exists. The most powerful insight. Only include if real. Else null.",
  "reflection": "One sentence connecting their open-ended answer to their structural pattern. Only if the answer is substantive. Else null.",
  "trajectory": "One sentence on what happens if these structural gaps are left unaddressed. Honest, not alarming."
}

Rules:
- holding: 1-2 items only. For Agree or Strongly agree responses. Genuine structural strengths only.
- gaps: 2-3 items only. For Strongly disagree or Disagree responses. If mostly strong, name the relative structural frontier.
- posture must feel like something a trusted advisor would say in a room — not a category or a score.
- No corporate jargon. No generic advice. Pure structural observation.`;

  try {
    const res = await fetch('/.netlify/functions/proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1200, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(i=>i.text||'').join('');
    S.result = JSON.parse(text.replace(/```json|```/g,'').trim());
    S.screen = 'results';
  } catch(e) {
    S.result = { posture:'Could not generate your assessment.', holding:[], gaps:[{dimension:'Error',insight:e.message||'Please check your API key and try again.'}], tension:null, reflection:null, trajectory:null };
    S.screen = 'results';
  }
  R();
}

async function sendMail(btn) {
  const name  = document.getElementById('cn').value.trim();
  const email = document.getElementById('ce').value.trim();
  const st    = document.getElementById('es2');
  if (!email) { st.className='em err'; st.textContent='Please enter your email address.'; return; }
  btn.disabled=true; btn.textContent='Sending...'; st.className='em'; st.textContent='';

  try {
    const res = await fetch('/.netlify/functions/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, result: S.result })
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent='Sent';
      st.className='em ok';
      st.textContent='Check your inbox. Manish has received a copy.';
    } else {
      throw new Error(data.error || 'Send failed');
    }
  } catch(e) {
    btn.disabled=false; btn.textContent='Send assessment';
    st.className='em err';
    st.textContent='Could not send. Please email manish@manishsinha.com directly.';
  }
}

function retry() { S={screen:'intro',cur:0,ans:{},qual:'',result:null}; R(); }
R();
</script>
</body>
</html>
